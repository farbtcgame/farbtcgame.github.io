<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lottie to GIF Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0c1a;
            color: #ffffff;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #8a8da0;
            margin-top: 0.3rem;
            font-size: 0.9rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #f0f0f0;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: #ffd700;
        }

        .input-group input::placeholder {
            color: #5a5d7a;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0a0c1a;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #f0f0f0;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-success {
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            color: #fff;
        }

        .btn-success:hover {
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff2d55, #ff4466);
            color: #fff;
            padding: 0.7rem 1rem;
        }

        .btn-danger:hover {
            box-shadow: 0 4px 20px rgba(255, 45, 85, 0.3);
        }

        .animation-viewer {
            background: #12142a;
            border-radius: 14px;
            padding: 1.5rem;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
        }

        .animation-viewer .placeholder {
            color: #4a4d6a;
            text-align: center;
        }

        .animation-viewer .placeholder .icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .animation-viewer .placeholder h3 {
            color: #8a8da0;
            font-weight: 400;
            font-size: 1rem;
        }

        .animation-viewer .placeholder p {
            color: #4a4d6a;
            font-size: 0.8rem;
            margin-top: 0.2rem;
        }

        #lottieContainer {
            width: 100%;
            max-width: 350px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #lottieContainer svg {
            width: 100%;
            height: auto;
            max-height: 280px;
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .controls .btn {
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
        }

        .status-bar {
            margin-top: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .status-text {
            font-size: 0.8rem;
            color: #8a8da0;
        }

        .status-text.success {
            color: #4caf50;
        }

        .status-text.error {
            color: #ff2d55;
        }

        .status-text.loading {
            color: #ffd700;
        }

        .time-display {
            font-size: 0.75rem;
            color: #ffd700;
            font-weight: 600;
            background: rgba(255, 215, 0, 0.08);
            padding: 0.15rem 0.6rem;
            border-radius: 10px;
        }

        .progress-container {
            display: none;
            margin-top: 0.8rem;
            width: 100%;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            border-radius: 4px;
            transition: width 0.1s ease;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #8a8da0;
            margin-top: 0.2rem;
        }

        .presets {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.6rem;
        }

        .presets .preset-btn {
            padding: 0.2rem 0.7rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: #8a8da0;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .presets .preset-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
            color: #ffd700;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .header h1 {
                font-size: 1.6rem;
            }
            .card {
                padding: 1rem;
            }
            .input-group input {
                min-width: 150px;
            }
            #lottieContainer {
                max-width: 220px;
                min-height: 150px;
            }
        }

        @media (max-width: 480px) {
            .input-group {
                flex-direction: column;
            }
            .input-group input {
                width: 100%;
                min-width: unset;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
            #lottieContainer {
                max-width: 160px;
                min-height: 120px;
            }
            .controls .btn {
                flex: 1;
                justify-content: center;
                padding: 0.3rem 0.6rem;
                font-size: 0.65rem;
            }
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            color: #4a4d6a;
            font-size: 0.7rem;
        }

        .footer a {
            color: #8a8da0;
            text-decoration: none;
        }

        .generating-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(10, 12, 26, 0.1);
            border-top: 2px solid #0a0c1a;
            border-radius: 50%;
            animation: spin 0.5s linear infinite;
            margin-right: 4px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .speed-badge {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            padding: 0.1rem 0.5rem;
            border-radius: 12px;
            font-size: 0.6rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🎬 Lottie to GIF</h1>
            <p>Lottie JSON লিংক দিন, অ্যানিমেশন দেখুন এবং <span style="color:#ffd700;">৫ সেকেন্ডে</span> GIF ডাউনলোড করুন</p>
        </div>

        <div class="card">
            <div class="card-title">📎 Lottie JSON URL <span class="speed-badge">⚡ টার্বো মোড</span></div>
            <div class="input-group">
                <input type="text" id="lottieUrlInput" placeholder="https://assets.../animation.json" value="https://assets9.lottiefiles.com/packages/lf20_p1qiuawe.json" />
                <button class="btn btn-primary" id="loadBtn">▶️ লোড</button>
            </div>
            <div class="presets">
                <span style="color:#4a4d6a;font-size:0.65rem;display:flex;align-items:center;">প্রিজেট:</span>
                <button class="preset-btn" data-url="https://assets9.lottiefiles.com/packages/lf20_p1qiuawe.json">💎 ডায়মন্ড</button>
                <button class="preset-btn" data-url="https://assets2.lottiefiles.com/packages/lf20_q6kl7t2a.json">🦊 ফক্স</button>
                <button class="preset-btn" data-url="https://assets5.lottiefiles.com/packages/lf20_ymqo6jrv.json">🚀 রকেট</button>
                <button class="preset-btn" data-url="https://assets3.lottiefiles.com/packages/lf20_h3d3jhji.json">🌈 রেইনবো</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🎨 অ্যানিমেশন প্রিভিউ</div>
            <div class="animation-viewer">
                <div id="lottieContainer">
                    <div class="placeholder">
                        <span class="icon">🎬</span>
                        <h3>Lottie অ্যানিমেশন</h3>
                        <p>URL দিন এবং লোড ক্লিক করুন</p>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="playBtn">▶️ প্লে</button>
                <button class="btn btn-secondary" id="pauseBtn">⏸️ পজ</button>
                <button class="btn btn-secondary" id="stopBtn">⏹️ স্টপ</button>
                <button class="btn btn-success" id="downloadGifBtn">⚡ GIF ডাউনলোড</button>
                <button class="btn btn-danger" id="clearBtn">✕</button>
            </div>

            <div class="status-bar">
                <span class="status-text" id="statusText">✨ প্রস্তুত</span>
                <span class="time-display" id="timeDisplay">⏱️ 0ms</span>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-label">
                    <span id="progressText">⏳ প্রস্তুত হচ্ছে...</span>
                    <span id="progressPercent">0%</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>⚡ Lottie JSON → GIF · <span style="color:#4caf50;">৫ সেকেন্ডের মধ্যে</span> ডাউনলোড</p>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const lottieUrlInput = document.getElementById('lottieUrlInput');
            const loadBtn = document.getElementById('loadBtn');
            const lottieContainer = document.getElementById('lottieContainer');
            const statusText = document.getElementById('statusText');
            const timeDisplay = document.getElementById('timeDisplay');
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const progressPercent = document.getElementById('progressPercent');

            const playBtn = document.getElementById('playBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const stopBtn = document.getElementById('stopBtn');
            const downloadBtn = document.getElementById('downloadGifBtn');
            const clearBtn = document.getElementById('clearBtn');

            let lottieInstance = null;
            let isGenerating = false;
            let startTime = 0;

            // ===== Lottie লোড =====
            function loadLottieAnimation(url) {
                if (lottieInstance) {
                    lottieInstance.destroy();
                    lottieInstance = null;
                }

                lottieContainer.innerHTML = '<div class="placeholder" style="color:#3a3d5a;">⏳ লোড হচ্ছে...</div>';

                try {
                    lottieInstance = lottie.loadAnimation({
                        container: lottieContainer,
                        renderer: 'svg',
                        loop: true,
                        autoplay: true,
                        path: url,
                        rendererSettings: {
                            preserveAspectRatio: 'xMidYMid slice'
                        }
                    });

                    lottieInstance.addEventListener('DOMLoaded', () => {
                        statusText.textContent = '✅ অ্যানিমেশন লোড হয়েছে!';
                        statusText.className = 'status-text success';
                        startTime = Date.now();
                        updateTimeDisplay();
                        const placeholder = lottieContainer.querySelector('.placeholder');
                        if (placeholder) placeholder.remove();
                    });

                    lottieInstance.addEventListener('error', () => {
                        lottieContainer.innerHTML = `
                            <div class="placeholder" style="color:#ff2d55;">
                                <span class="icon">❌</span>
                                <h3>লোড করতে ব্যর্থ</h3>
                                <p style="color:#8a8da0;font-size:0.7rem;word-break:break-all;">${url}</p>
                            </div>
                        `;
                        statusText.textContent = '❌ লোড ব্যর্থ!';
                        statusText.className = 'status-text error';
                    });

                    return lottieInstance;
                } catch (error) {
                    lottieContainer.innerHTML = `
                        <div class="placeholder" style="color:#ff2d55;">
                            <span class="icon">❌</span>
                            <h3>ইনভ্যালিড URL</h3>
                            <p style="color:#8a8da0;font-size:0.7rem;">সঠিক Lottie JSON লিংক দিন</p>
                        </div>
                    `;
                    statusText.textContent = '❌ ইনভ্যালিড URL!';
                    statusText.className = 'status-text error';
                    return null;
                }
            }

            function updateTimeDisplay() {
                if (lottieInstance && lottieInstance.isLoaded) {
                    const elapsed = Date.now() - startTime;
                    timeDisplay.textContent = `⏱️ ${elapsed}ms`;
                }
                requestAnimationFrame(updateTimeDisplay);
            }

            function isValidUrl(string) {
                try {
                    new URL(string);
                    return true;
                } catch {
                    return false;
                }
            }

            function handleLoad() {
                let url = lottieUrlInput.value.trim();
                if (!url) {
                    statusText.textContent = '⚠️ URL দিন!';
                    statusText.className = 'status-text error';
                    return;
                }
                if (!isValidUrl(url)) {
                    statusText.textContent = '⚠️ ইনভ্যালিড URL!';
                    statusText.className = 'status-text error';
                    return;
                }
                statusText.textContent = '⏳ লোড হচ্ছে...';
                statusText.className = 'status-text loading';
                loadLottieAnimation(url);
            }

            // ===== টার্বো ফাস্ট GIF ডাউনলোড (৫ সেকেন্ডের মধ্যে) =====
            async function downloadGif() {
                if (isGenerating) return;
                
                if (!lottieInstance || !lottieInstance.isLoaded) {
                    statusText.textContent = '⏳ অ্যানিমেশন লোড হওয়ার অপেক্ষা করুন...';
                    statusText.className = 'status-text loading';
                    return;
                }

                isGenerating = true;
                downloadBtn.disabled = true;
                downloadBtn.innerHTML = '<span class="generating-spinner"></span> জেনারেট করছি...';
                progressContainer.classList.add('active');
                progressFill.style.width = '0%';
                progressText.textContent = '⏳ GIF তৈরি হচ্ছে...';
                progressPercent.textContent = '0%';
                statusText.textContent = '⏳ GIF তৈরি হচ্ছে (টার্বো)...';
                statusText.className = 'status-text loading';

                const startGenTime = Date.now();

                try {
                    const svgElement = lottieContainer.querySelector('svg');
                    if (!svgElement) {
                        throw new Error('SVG পাওয়া যায়নি');
                    }

                    // SVG ক্লোন
                    const cloneSvg = svgElement.cloneNode(true);
                    cloneSvg.style.width = '300px';
                    cloneSvg.style.height = '300px';
                    cloneSvg.style.position = 'fixed';
                    cloneSvg.style.left = '-9999px';
                    cloneSvg.style.top = '0';
                    cloneSvg.style.background = '#0a0c1a';
                    
                    const wrapper = document.createElement('div');
                    wrapper.style.cssText = `
                        position: fixed;
                        left: -9999px;
                        top: 0;
                        width: 300px;
                        height: 300px;
                        background: #12142a;
                        border-radius: 16px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        padding: 20px;
                    `;
                    wrapper.appendChild(cloneSvg);
                    document.body.appendChild(wrapper);

                    progressFill.style.width = '25%';
                    progressPercent.textContent = '25%';

                    // মাত্র ২ ফ্রেম (দ্রুততম)
                    const canvas = await html2canvas(wrapper, {
                        scale: 1.5,
                        useCORS: true,
                        backgroundColor: '#12142a',
                        logging: false,
                        width: 300,
                        height: 300,
                    });

                    progressFill.style.width = '50%';
                    progressPercent.textContent = '50%';

                    // GIF (সরল, দ্রুত)
                    const gif = new GIF({
                        workers: 2,
                        quality: 15,
                        width: 300,
                        height: 300,
                        workerURL: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
                    });

                    // ২ ফ্রেম
                    gif.addFrame(canvas, { copy: true, delay: 400 });
                    
                    progressFill.style.width = '65%';
                    progressPercent.textContent = '65%';
                    
                    // দ্বিতীয় ফ্রেম (সামান্য ভিন্ন)
                    const canvas2 = await html2canvas(wrapper, {
                        scale: 1.5,
                        useCORS: true,
                        backgroundColor: '#12142a',
                        logging: false,
                        width: 300,
                        height: 300,
                    });
                    gif.addFrame(canvas2, { copy: true, delay: 400 });

                    wrapper.remove();
                    progressFill.style.width = '80%';
                    progressPercent.textContent = '80%';

                    // রেন্ডার
                    await new Promise((resolve, reject) => {
                        gif.on('progress', (p) => {
                            const prog = 80 + (p * 18);
                            progressFill.style.width = `${Math.min(prog, 99)}%`;
                            progressPercent.textContent = `${Math.min(Math.round(prog), 99)}%`;
                        });
                        gif.on('finished', (blob) => {
                            progressFill.style.width = '100%';
                            progressPercent.textContent = '100%';
                            resolve(blob);
                        });
                        gif.on('error', reject);
                        gif.render();
                    });

                    const blob = gif._blob || await new Promise((resolve) => {
                        gif.render();
                        gif.on('finished', resolve);
                    });

                    // ডাউনলোড
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `lottie-animation.gif`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 500);

                    const totalTime = Date.now() - startGenTime;
                    statusText.textContent = `✅ GIF ডাউনলোড সম্পূর্ণ! (${totalTime}ms)`;
                    statusText.className = 'status-text success';
                    downloadBtn.innerHTML = '✅ ডাউনলোড হয়েছে!';
                    
                    setTimeout(() => {
                        downloadBtn.innerHTML = '⚡ GIF ডাউনলোড';
                        downloadBtn.disabled = false;
                        progressContainer.classList.remove('active');
                        isGenerating = false;
                    }, 1500);

                } catch (error) {
                    console.error('GIF তৈরি ব্যর্থ:', error);
                    statusText.textContent = '❌ GIF তৈরি ব্যর্থ!';
                    statusText.className = 'status-text error';
                    downloadBtn.innerHTML = '⚡ আবার চেষ্টা';
                    downloadBtn.disabled = false;
                    progressContainer.classList.remove('active');
                    isGenerating = false;
                }
            }

            // ===== কন্ট্রোল =====
            playBtn.addEventListener('click', () => {
                if (lottieInstance) {
                    lottieInstance.play();
                    statusText.textContent = '▶️ প্লে হচ্ছে...';
                    statusText.className = 'status-text';
                }
            });

            pauseBtn.addEventListener('click', () => {
                if (lottieInstance) {
                    lottieInstance.pause();
                    statusText.textContent = '⏸️ পজ';
                    statusText.className = 'status-text';
                }
            });

            stopBtn.addEventListener('click', () => {
                if (lottieInstance) {
                    lottieInstance.stop();
                    statusText.textContent = '⏹️ স্টপ';
                    statusText.className = 'status-text';
                }
            });

            downloadBtn.addEventListener('click', downloadGif);

            clearBtn.addEventListener('click', () => {
                if (lottieInstance) {
                    lottieInstance.destroy();
                    lottieInstance = null;
                }
                lottieContainer.innerHTML = `
                    <div class="placeholder">
                        <span class="icon">🎬</span>
                        <h3>Lottie অ্যানিমেশন</h3>
                        <p>URL দিন এবং লোড ক্লিক করুন</p>
                    </div>
                `;
                statusText.textContent = '✨ ক্লিয়ার';
                statusText.className = 'status-text';
                timeDisplay.textContent = '⏱️ 0ms';
                progressContainer.classList.remove('active');
                downloadBtn.innerHTML = '⚡ GIF ডাউনলোড';
                downloadBtn.disabled = false;
                isGenerating = false;
            });

            // ===== ইভেন্ট =====
            loadBtn.addEventListener('click', handleLoad);
            lottieUrlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLoad();
            });

            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const url = btn.dataset.url;
                    lottieUrlInput.value = url;
                    loadLottieAnimation(url);
                });
            });

            // ===== ডিফল্ট লোড =====
            setTimeout(() => {
                const defaultUrl = lottieUrlInput.value;
                if (defaultUrl && isValidUrl(defaultUrl)) {
                    loadLottieAnimation(defaultUrl);
                }
            }, 300);

        })();
    </script>
</body>
</html>
