<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
html,body{
margin:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

#lottie{
width:100vw;
height:100vh;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
</head>

<body>

<div id="lottie"></div>

<script>

// এখানে URL থেকে id নিবে
const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "0";


// এখানে তোমার Lottie Folder CID বসবে
const CID = "bafybeiajrsl6lpc46ccanedbyrafcudm3ccjpxsui4n3gcokvkq472vwpa";


// JSON Link তৈরি হবে
const jsonURL = `https://ipfs.io/ipfs/${CID}/${id}.lottie.json`;

lottie.loadAnimation({

container:document.getElementById("lottie"),

renderer:"svg",

loop:true,

autoplay:true,

path:jsonURL

});

</script>

</body>
</html>
